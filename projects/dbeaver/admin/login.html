<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — DigitalHands.in</title>
  <link rel="stylesheet" href="assets/css/admin.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🤝</text></svg>">
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-logo">🤝</div>
      <div class="login-brand-name">DigitalHands.in</div>
      <div class="login-brand-tag">AI Website Builder Platform</div>
    </div>

    <h2 class="login-title">Admin Portal</h2>
    <p class="login-sub">Sign in to manage your clients and websites</p>

    <div class="login-error" id="login-error">
      Invalid email or password. Please try again.
    </div>

    <form id="login-form" novalidate>
      <div class="form-field">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="admin@digitalhands.in" autocomplete="username" required>
      </div>
      <div class="form-field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn" id="submit-btn">
        Sign In to Admin Panel
      </button>
    </form>

    <div class="login-divider">demo credentials</div>
    <div class="login-hint">
      Email: <span>admin@digitalhands.in</span><br><br>
      Password: <span>admin123</span>
    </div>

    <div style="text-align:center; margin-top:1.6rem;">
      <a href="../client/login.html" style="font-size:.82rem; color:var(--text-dim);">
        → Client portal login
      </a>
    </div>
    <div style="text-align:center; margin-top:.8rem;">
      <a href="../demo/index.html" style="font-size:.8rem; color:var(--text-dim);">
        ← View demo site
      </a>
    </div>
  </div>
</div>

<script>
(function() {
  // Redirect if already logged in
  if (sessionStorage.getItem('dh_admin_auth') === 'true') {
    window.location.href = 'dashboard.html';
  }

  const ADMIN_CREDS = [
    { email: 'admin@digitalhands.in', password: 'admin123', name: 'Admin', role: 'Super Admin' },
    { email: 'aakif@digitalhands.in', password: 'dh2024!',  name: 'Aakif', role: 'Owner' }
  ];

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('submit-btn');
    const errEl    = document.getElementById('login-error');

    btn.textContent = 'Signing in…'; btn.disabled = true;
    errEl.classList.remove('show');

    setTimeout(function() {
      const user = ADMIN_CREDS.find(u => u.email === email && u.password === password);
      if (user) {
        sessionStorage.setItem('dh_admin_auth', 'true');
        sessionStorage.setItem('dh_admin_user', JSON.stringify(user));
        window.location.href = 'dashboard.html';
      } else {
        errEl.classList.add('show');
        btn.textContent = 'Sign In to Admin Panel'; btn.disabled = false;
      }
    }, 800);
  });
})();
</script>
</body>
</html>
