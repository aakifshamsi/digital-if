name: Build GPS Phantom APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: gradle/gradle-build-action@v3

      - name: Grant execute permission
        run: chmod +x gradlew
        working-directory: projects/gps-phantom

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: projects/gps-phantom

      - name: Upload App APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gps-phantom-app-debug
          path: projects/gps-phantom/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Ghost Module APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gps-phantom-ghost-debug
          path: projects/gps-phantom/ghost-module/build/outputs/apk/debug/ghost-module-debug.apk
